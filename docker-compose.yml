services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medical}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-medicaldb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medical} -d ${POSTGRES_DB:-medicaldb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  patient-service:
    build: ./patient-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medical}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-medicaldb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      PORT: 3000
      NODE_ENV: production
    volumes:
      - ./patients.json:/patients.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"

  heart-rate-service:
    build: ./heart-rate-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medical}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-medicaldb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      PORT: 3000
      NODE_ENV: production
    volumes:
      - ./patients.json:/patients.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3000"

  analytics-service:
    build: ./analytics-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-medical}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-medicaldb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3003:3000"

  frontend:
    build: ./frontend
    depends_on:
      - patient-service
      - heart-rate-service
      - analytics-service

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9090:80"
    depends_on:
      - patient-service
      - heart-rate-service
      - analytics-service
      - frontend

volumes:
  postgres-data:
  redis-data:
