# Apply all manifests: kubectl apply -f k8s/ -R
# Add to /etc/hosts: 127.0.0.1  medical.local
# Requires nginx-ingress-controller: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medical-ingress
  namespace: medical
  labels:
    app: medical-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - host: medical.local
      http:
        paths:
          - path: /api/patients(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 3000
          - path: /api/heart-rate(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: heart-rate-service
                port:
                  number: 3000
          - path: /api/analytics(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: analytics-service
                port:
                  number: 3000
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
